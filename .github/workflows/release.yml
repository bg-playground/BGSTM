name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          NOTES_FILE="RELEASE_NOTES.md"

          awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" docs/CHANGELOG.md > "$NOTES_FILE"

          if [ -s "$NOTES_FILE" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release $VERSION — see [CHANGELOG](https://github.com/bg-playground/BGSTM/blob/main/docs/CHANGELOG.md) for details." > "$NOTES_FILE"
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: BGSTM ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: false
